upstream django {
    server web:8000;
}

# HTTPS configuration (using the existing certificate)
server {
    listen 443 ssl;
    http2 on;
    server_name egrn2.foodconceptsplc.com;
    charset utf-8;

    # Max upload size
    client_max_body_size 20M;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/egrn2.foodconceptsplc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/egrn2.foodconceptsplc.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /static/ {
        alias /app/static/;
        expires 30d;
    }

    location /API/static/ {
        alias /app/static/;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location /API/media/ {
        alias /app/media/;
        expires 7d;
    }

    # Health check
    location /API/health/ {
        proxy_pass         http://django/health/;
        proxy_set_header   Host $host;
        access_log         off;
    }

    location /API/ {
        proxy_pass         http://django/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # HTML files — sub-apps
    location /grn {
        alias /app/html/grn;
        index index.html;
        try_files $uri $uri/ /grn/index.html;
    }

    location /wac {
        alias /app/html/wac;
        index index.html;
        try_files $uri $uri/ /wac/index.html;
    }

    # HTML files — landing page
    location / {
        root /app/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name egrn2.foodconceptsplc.com;

    location /API/ {
        return 301 https://$host$request_uri;
    }

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
