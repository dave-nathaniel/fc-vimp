upstream django {
    server web:8000;
}

# HTTPS configuration (uncomment after obtaining SSL certificates)
server {
    listen 443 ssl;
    http2 on;
    server_name crstoreportal.foodconceptsplc.com;
    charset utf-8;

    # Max upload size
    client_max_body_size 20M;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/crstoreportal.foodconceptsplc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crstoreportal.foodconceptsplc.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;                                                                              
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /API/static/ {
        alias /app/static/;
        expires 30d;
        # add_header Cache-Control "public, immutable";
    }

    location /API/media/ {
        alias /app/media/;
        expires 7d;
        #add_header Cache-Control "public";
    }

    # ───────── Health check
    location /API/health/ {
        proxy_pass         http://django/health/;
        proxy_set_header   Host $host;
        access_log         off;
    }

    location /API/ {
        proxy_pass         http://django/;   # note trailing slash
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

# HTTP to HTTPS redirect (uncomment after obtaining SSL certificates)
server {
    listen 80;
    server_name crstoreportal.foodconceptsplc.com;

    location /API/ {
        return 301 https://$host$request_uri;
    }
    
    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}