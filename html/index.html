<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Concepts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" property="og:title" content="Food Concepts">
    <meta name="description" content="Food Concepts Plc is a leading multi-brand QSR group, operating three of Nigeria’s most loved brands, Chicken Republic, PieXpress and The Chop Box.">
    <link rel="icon" href="https://foodconceptsplc.com/wp-content/uploads/2019/10/FoodConcepts_Favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .welcome-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }
        .logo {
            width: 150px;
            margin-bottom: 20px;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 20px;
        }
        p {
            font-weight: 400;
            margin-bottom: 30px;
            color: #555;
        }
        button {
            margin: 10px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        @media (max-width: 480px) {
            .welcome-container {
                padding: 20px;
            }
            button {
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <img src="https://foodconceptsplc.com/wp-content/uploads/2019/10/FoodConcepts_Logo-1.png" alt="Food Concepts Logo" class="logo">
        <!-- <h1>Welcome!</h1> -->
        <p>Which system would you like to navigate to?</p>
        <button onclick="window.location.href='/grn'">eGRN</button>
        <button onclick="window.location.href='/wac'">WAC</button>
    </div>
</body>
</html>
